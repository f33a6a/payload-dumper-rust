name: Windows Builds

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        architecture: [x86_64, i686, arm64]
      fail-fast: false

    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up MinGW
        uses: egor-tensin/setup-mingw@v2
        with:
          platform: ${{ matrix.architecture == 'i686' && 'x86' || matrix.architecture }}

      - name: Install protoc using Chocolatey
        run: |
          choco install protoc -y
          # Explicitly add protoc to PATH
          echo "$env:ChocolateyInstall\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          protoc --version

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Set target
        id: set-target
        run: |
          if ("${{ matrix.architecture }}" -eq "x86_64") {
            echo "TARGET=x86_64-pc-windows-gnu" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } elseif ("${{ matrix.architecture }}" -eq "i686") {
            echo "TARGET=i686-pc-windows-gnu" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            echo "TARGET=aarch64-pc-windows-gnu" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Add Rust target
        run: |
          rustup target add ${{ env.TARGET }}

      - name: Create library directories
        run: |
          mkdir -p ${{ github.workspace }}\lib\windows\${{ matrix.architecture }}
          mkdir -p ${{ github.workspace }}\build\zlib
          mkdir -p ${{ github.workspace }}\build\libzip
          mkdir -p ${{ github.workspace }}\build\liblzma

      - name: Debug MinGW installation
        run: |
          Write-Host "Searching for MinGW installations:"
          Get-ChildItem -Path "C:\ProgramData\chocolatey\lib\mingw" -Recurse -Depth 2 -ErrorAction SilentlyContinue
          Get-ChildItem -Path "C:\msys64" -Recurse -Depth 2 -ErrorAction SilentlyContinue

      - name: Download and extract zlib
        run: |
          cd ${{ github.workspace }}\build\zlib
          Invoke-WebRequest -Uri "https://zlib.net/zlib-1.3.1.tar.gz" -OutFile "zlib.tar.gz"
          tar -xzf zlib.tar.gz --strip-components=1

      - name: Build zlib
        run: |
          cd ${{ github.workspace }}\build\zlib
          
          # Configure for MinGW cross-compilation
          $env:BINARY_PATH = "${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\bin"
          $env:INCLUDE_PATH = "${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\include"
          $env:LIBRARY_PATH = "${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\lib"
          
          # Make sure directories exist
          mkdir -p $env:BINARY_PATH -Force
          mkdir -p $env:INCLUDE_PATH -Force
          mkdir -p $env:LIBRARY_PATH -Force
          
          # Set up compiler based on architecture
          if ("${{ matrix.architecture }}" -eq "i686") {
            $env:CC = "i686-w64-mingw32-gcc"
          } elseif ("${{ matrix.architecture }}" -eq "arm64") {
            $env:CC = "aarch64-w64-mingw32-gcc"
          } else {
            $env:CC = "x86_64-w64-mingw32-gcc"
          }
          
          # Use mingw32-make if available, otherwise use standard make
          $makeCommand = Get-Command mingw32-make -ErrorAction SilentlyContinue
          if ($makeCommand) {
            $make = "mingw32-make"
          } else {
            $make = "make"
          }
          
          # Configure and build statically
          $env:CFLAGS = "-static"
          ./configure --prefix="${{ github.workspace }}\lib\windows\${{ matrix.architecture }}" --static
          
          & $make -j $env:NUMBER_OF_PROCESSORS
          & $make install
          
          # Verify the built library file exists
          if (Test-Path "${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\lib\libz.a") {
            echo "zlib static library successfully built"
          } else {
            echo "Failed to build zlib static library"
            exit 1
          }

      - name: Download and extract liblzma
        run: |
          cd ${{ github.workspace }}\build\liblzma
          Invoke-WebRequest -Uri "https://github.com/tukaani-project/xz/releases/download/v5.8.1/xz-5.8.1.tar.gz" -OutFile "liblzma.tar.gz"
          tar -xzf liblzma.tar.gz --strip-components=1

      - name: Build liblzma
        run: |
          cd ${{ github.workspace }}\build\liblzma
          
          # Set up compiler based on architecture
          if ("${{ matrix.architecture }}" -eq "i686") {
            $env:CC = "i686-w64-mingw32-gcc"
            $hostOption = "--host=i686-w64-mingw32"
          } elseif ("${{ matrix.architecture }}" -eq "arm64") {
            $env:CC = "aarch64-w64-mingw32-gcc"
            $hostOption = "--host=aarch64-w64-mingw32"
          } else {
            $env:CC = "x86_64-w64-mingw32-gcc"
            $hostOption = "--host=x86_64-w64-mingw32"
          }
          
          # Configure with static libraries only
          $env:CFLAGS = "-static"
          ./configure $hostOption --prefix="${{ github.workspace }}\lib\windows\${{ matrix.architecture }}" --disable-shared --enable-static
          
          # Use mingw32-make if available, otherwise use standard make
          $makeCommand = Get-Command mingw32-make -ErrorAction SilentlyContinue
          if ($makeCommand) {
            $make = "mingw32-make"
          } else {
            $make = "make"
          }
          
          & $make -j $env:NUMBER_OF_PROCESSORS
          & $make install
          
          # Verify the built library file exists
          if (Test-Path "${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\lib\liblzma.a") {
            echo "liblzma static library successfully built"
          } else {
            echo "Failed to build liblzma static library"
            exit 1
          }

      - name: Download and extract libzip
        run: |
          cd ${{ github.workspace }}\build\libzip
          Invoke-WebRequest -Uri "https://libzip.org/download/libzip-1.11.3.tar.xz" -OutFile "libzip.tar.xz"
          tar -xf libzip.tar.xz --strip-components=1

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Build libzip
        run: |
          cd ${{ github.workspace }}\build\libzip
          mkdir -p build
          cd build
          
          # Set up compiler and flags based on architecture
          if ("${{ matrix.architecture }}" -eq "i686") {
            $env:TOOLCHAIN = "i686-w64-mingw32"
          } elseif ("${{ matrix.architecture }}" -eq "arm64") {
            $env:TOOLCHAIN = "aarch64-w64-mingw32"
          } else {
            $env:TOOLCHAIN = "x86_64-w64-mingw32"
          }
          
          # Configure libzip with CMake for MinGW cross-compilation
          cmake .. `
            -G "MinGW Makefiles" `
            -DCMAKE_C_COMPILER="$env:TOOLCHAIN-gcc" `
            -DCMAKE_CXX_COMPILER="$env:TOOLCHAIN-g++" `
            -DCMAKE_SYSTEM_NAME="Windows" `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}\lib\windows\${{ matrix.architecture }}" `
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}\lib\windows\${{ matrix.architecture }}" `
            -DZLIB_INCLUDE_DIR="${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\include" `
            -DZLIB_LIBRARY="${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\lib\libz.a" `
            -DLIBLZMA_INCLUDE_DIR="${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\include" `
            -DLIBLZMA_LIBRARY="${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\lib\liblzma.a" `
            -DENABLE_BZIP2=OFF `
            -DENABLE_ZSTD=OFF `
            -DENABLE_OPENSSL=OFF `
            -DENABLE_GNUTLS=OFF `
            -DENABLE_MBEDTLS=OFF `
            -DBUILD_SHARED_LIBS=OFF `
            -DBUILD_DOC=OFF `
            -DBUILD_EXAMPLES=OFF `
            -DBUILD_TOOLS=OFF `
            -DBUILD_REGRESS=OFF `
            -DBUILD_OSSFUZZ=OFF
          
          # Use mingw32-make if available, otherwise use standard make
          $makeCommand = Get-Command mingw32-make -ErrorAction SilentlyContinue
          if ($makeCommand) {
            $make = "mingw32-make"
          } else {
            $make = "make"
          }
          
          & $make -j $env:NUMBER_OF_PROCESSORS
          & $make install
          
          # Verify the built library file exists
          if (Test-Path "${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\lib\libzip.a") {
            echo "libzip static library successfully built"
          } else {
            echo "Failed to build libzip static library"
            exit 1
          }

      - name: Set up environment
        run: |
          echo "PKG_CONFIG_PATH=${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "LIBRARY_PATH=${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\lib" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "C_INCLUDE_PATH=${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\include" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "CPLUS_INCLUDE_PATH=${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\include" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "PKG_CONFIG_ALLOW_CROSS=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create .cargo config
        run: |
          mkdir -p .cargo
          @"
           [target.${{ env.TARGET }}]
           rustflags = ["-L", "${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\lib"]
           "@ | Out-File -FilePath .cargo\config.toml -Encoding utf8
           Get-Content .cargo\config.toml

      - name: Build for ${{ matrix.architecture }}
        run: |
          # Skip the problematic libpthread.dll.a removal since it's failing
          # Just proceed with the build directly
          
          # Verify libraries are built for the correct architecture
          echo "Verifying libraries exist:"
          Get-Item ${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\lib\libz.a
          Get-Item ${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\lib\libzip.a
          Get-Item ${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\lib\liblzma.a
          
          # Build with cross-compile target
          $env:RUSTFLAGS = "-C target-feature=+crt-static"
          
          echo "Building for ${{ env.TARGET }} with RUSTFLAGS=$env:RUSTFLAGS"
          echo "PKG_CONFIG_PATH=$env:PKG_CONFIG_PATH"
          echo "LIBRARY_PATH=$env:LIBRARY_PATH"
          
          cargo build --release --target ${{ env.TARGET }}

      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Copy binaries
        run: |
          # Copy binary with appropriate extension
          cp target/${{ env.TARGET }}/release/payload_dumper.exe ./artifacts/payload_dumper-${{ matrix.architecture }}.exe
          
          # Verify binary exists
          if (Test-Path ./artifacts/payload_dumper-${{ matrix.architecture }}.exe) {
            echo "Binary was built successfully:"
            Get-Item ./artifacts/payload_dumper-${{ matrix.architecture }}.exe | Format-List
          } else {
            echo "Failed to find binary"
            Get-ChildItem -Recurse -Path target -Include *.exe | Where-Object { !$_.PSIsContainer }
          }

      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: payload_dumper-${{ matrix.architecture }}-windows
          path: artifacts/payload_dumper-${{ matrix.architecture }}.exe
          if-no-files-found: warn
