name: Windows Builds (MinGW)

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        architecture: [x64, x86, arm64]
      fail-fast: false

    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install MinGW and dependencies
        run: |
          choco install mingw --version=8.1.0
          choco install msys2 --params "/InstallDir:C:\msys64 /NoUpdate /NoPath"
          choco install protoc
          
          if ("${{ matrix.architecture }}" -eq "x64") {
            C:\msys64\usr\bin\bash -lc "pacman -S --noconfirm mingw-w64-x86_64-toolchain mingw-w64-x86_64-cmake mingw-w64-x86_64-zlib mingw-w64-x86_64-libzip mingw-w64-x86_64-xz"
          } elseif ("${{ matrix.architecture }}" -eq "x86") {
            C:\msys64\usr\bin\bash -lc "pacman -S --noconfirm mingw-w64-i686-toolchain mingw-w64-i686-cmake mingw-w64-i686-zlib mingw-w64-i686-libzip mingw-w64-i686-xz"
          } elseif ("${{ matrix.architecture }}" -eq "arm64") {
            C:\msys64\usr\bin\bash -lc "pacman -S --noconfirm mingw-w64-clang-aarch64-toolchain mingw-w64-clang-aarch64-cmake mingw-w64-clang-aarch64-zlib mingw-w64-clang-aarch64-libzip mingw-w64-clang-aarch64-xz"
          }
        shell: pwsh

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Set target
        id: set-target
        run: |
          if ("${{ matrix.architecture }}" -eq "x64") {
            echo "TARGET=x86_64-pc-windows-gnu" | Out-File -FilePath $env:GITHUB_ENV -Append
            echo "MSYS_PATH=C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_ENV -Append
          } elseif ("${{ matrix.architecture }}" -eq "x86") {
            echo "TARGET=i686-pc-windows-gnu" | Out-File -FilePath $env:GITHUB_ENV -Append
            echo "MSYS_PATH=C:\msys64\mingw32\bin" | Out-File -FilePath $env:GITHUB_ENV -Append
          } elseif ("${{ matrix.architecture }}" -eq "arm64") {
            echo "TARGET=aarch64-pc-windows-gnu" | Out-File -FilePath $env:GITHUB_ENV -Append
            echo "MSYS_PATH=C:\msys64\clang64\bin" | Out-File -FilePath $env:GITHUB_ENV -Append
          }
        shell: pwsh
          
      - name: Add Rust target
        run: |
          rustup target add ${{ env.TARGET }}

      - name: Update PATH
        run: |
          echo "${{ env.MSYS_PATH }}" | Out-File -FilePath $env:GITHUB_PATH -Append
          echo "C:\msys64\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
        shell: pwsh

      - name: Create library directories
        run: |
          mkdir -p ${{ github.workspace }}\lib\windows\${{ matrix.architecture }}
          mkdir -p ${{ github.workspace }}\build\zlib
          mkdir -p ${{ github.workspace }}\build\libzip
          mkdir -p ${{ github.workspace }}\build\liblzma

      - name: Download and extract zlib
        run: |
          cd ${{ github.workspace }}\build\zlib
          curl -L https://zlib.net/zlib-1.3.1.tar.gz -o zlib.tar.gz
          C:\msys64\usr\bin\bash -lc "cd ${{ github.workspace }}/build/zlib && tar -xzf zlib.tar.gz --strip-components=1"
        shell: pwsh

      - name: Build zlib
        run: |
          cd ${{ github.workspace }}\build\zlib
          
          if ("${{ matrix.architecture }}" -eq "x64") {
            $env:PATH = "${{ env.MSYS_PATH }};$env:PATH"
            C:\msys64\usr\bin\bash -lc "cd ${{ github.workspace }}/build/zlib && CFLAGS='-static' ./configure --prefix=${{ github.workspace }}/lib/windows/x64 --static && make -j$(nproc) && make install"
          } elseif ("${{ matrix.architecture }}" -eq "x86") {
            $env:PATH = "${{ env.MSYS_PATH }};$env:PATH"
            C:\msys64\usr\bin\bash -lc "cd ${{ github.workspace }}/build/zlib && CFLAGS='-static -m32' ./configure --prefix=${{ github.workspace }}/lib/windows/x86 --static && make -j$(nproc) && make install"
          } elseif ("${{ matrix.architecture }}" -eq "arm64") {
            $env:PATH = "${{ env.MSYS_PATH }};$env:PATH"
            C:\msys64\usr\bin\bash -lc "cd ${{ github.workspace }}/build/zlib && CC=clang CFLAGS='-static' ./configure --prefix=${{ github.workspace }}/lib/windows/arm64 --static && make -j$(nproc) && make install"
          }
        shell: pwsh

      - name: Download and extract liblzma
        run: |
          cd ${{ github.workspace }}\build\liblzma
          curl -L https://github.com/tukaani-project/xz/releases/download/v5.8.1/xz-5.8.1.tar.gz -o liblzma.tar.gz
          C:\msys64\usr\bin\bash -lc "cd ${{ github.workspace }}/build/liblzma && tar -xzf liblzma.tar.gz --strip-components=1"
        shell: pwsh
          
      - name: Build liblzma
        run: |
          cd ${{ github.workspace }}\build\liblzma
          
          if ("${{ matrix.architecture }}" -eq "x64") {
            $env:PATH = "${{ env.MSYS_PATH }};$env:PATH"
            C:\msys64\usr\bin\bash -lc "cd ${{ github.workspace }}/build/liblzma && CFLAGS='-static' ./configure --prefix=${{ github.workspace }}/lib/windows/x64 --disable-shared --enable-static && make -j$(nproc) && make install"
          } elseif ("${{ matrix.architecture }}" -eq "x86") {
            $env:PATH = "${{ env.MSYS_PATH }};$env:PATH"
            C:\msys64\usr\bin\bash -lc "cd ${{ github.workspace }}/build/liblzma && CFLAGS='-static -m32' ./configure --prefix=${{ github.workspace }}/lib/windows/x86 --disable-shared --enable-static && make -j$(nproc) && make install"
          } elseif ("${{ matrix.architecture }}" -eq "arm64") {
            $env:PATH = "${{ env.MSYS_PATH }};$env:PATH"
            C:\msys64\usr\bin\bash -lc "cd ${{ github.workspace }}/build/liblzma && CC=clang CFLAGS='-static' ./configure --prefix=${{ github.workspace }}/lib/windows/arm64 --disable-shared --enable-static && make -j$(nproc) && make install"
          }
        shell: pwsh

      - name: Download and extract libzip
        run: |
          cd ${{ github.workspace }}\build\libzip
          curl -L https://libzip.org/download/libzip-1.11.3.tar.xz -o libzip.tar.xz
          C:\msys64\usr\bin\bash -lc "cd ${{ github.workspace }}/build/libzip && tar -xf libzip.tar.xz --strip-components=1"
        shell: pwsh

      - name: Build libzip
        run: |
          cd ${{ github.workspace }}\build\libzip
          
          if ("${{ matrix.architecture }}" -eq "x64") {
            $env:PATH = "${{ env.MSYS_PATH }};$env:PATH"
            C:\msys64\usr\bin\bash -lc "cd ${{ github.workspace }}/build/libzip && mkdir -p build && cd build && \
            cmake .. \
              -G 'MSYS Makefiles' \
              -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/lib/windows/x64 \
              -DCMAKE_PREFIX_PATH=${{ github.workspace }}/lib/windows/x64 \
              -DENABLE_LZMA=ON \
              -DENABLE_BZIP2=OFF \
              -DENABLE_ZSTD=OFF \
              -DENABLE_OPENSSL=OFF \
              -DENABLE_COMMONCRYPTO=OFF \
              -DENABLE_GNUTLS=OFF \
              -DENABLE_MBEDTLS=OFF \
              -DBUILD_SHARED_LIBS=OFF \
              -DBUILD_DOC=OFF \
              -DBUILD_EXAMPLES=OFF \
              -DBUILD_TOOLS=OFF \
              -DBUILD_REGRESS=OFF \
              -DBUILD_OSSFUZZ=OFF && \
            make -j$(nproc) && \
            make install"
          } elseif ("${{ matrix.architecture }}" -eq "x86") {
            $env:PATH = "${{ env.MSYS_PATH }};$env:PATH"
            C:\msys64\usr\bin\bash -lc "cd ${{ github.workspace }}/build/libzip && mkdir -p build && cd build && \
            CFLAGS='-m32' CXXFLAGS='-m32' LDFLAGS='-m32' \
            cmake .. \
              -G 'MSYS Makefiles' \
              -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/lib/windows/x86 \
              -DCMAKE_PREFIX_PATH=${{ github.workspace }}/lib/windows/x86 \
              -DENABLE_LZMA=ON \
              -DENABLE_BZIP2=OFF \
              -DENABLE_ZSTD=OFF \
              -DENABLE_OPENSSL=OFF \
              -DENABLE_COMMONCRYPTO=OFF \
              -DENABLE_GNUTLS=OFF \
              -DENABLE_MBEDTLS=OFF \
              -DBUILD_SHARED_LIBS=OFF \
              -DBUILD_DOC=OFF \
              -DBUILD_EXAMPLES=OFF \
              -DBUILD_TOOLS=OFF \
              -DBUILD_REGRESS=OFF \
              -DBUILD_OSSFUZZ=OFF && \
            make -j$(nproc) && \
            make install"
          } elseif ("${{ matrix.architecture }}" -eq "arm64") {
            $env:PATH = "${{ env.MSYS_PATH }};$env:PATH"
            C:\msys64\usr\bin\bash -lc "cd ${{ github.workspace }}/build/libzip && mkdir -p build && cd build && \
            CC=clang CXX=clang++ \
            cmake .. \
              -G 'MSYS Makefiles' \
              -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/lib/windows/arm64 \
              -DCMAKE_PREFIX_PATH=${{ github.workspace }}/lib/windows/arm64 \
              -DENABLE_LZMA=ON \
              -DENABLE_BZIP2=OFF \
              -DENABLE_ZSTD=OFF \
              -DENABLE_OPENSSL=OFF \
              -DENABLE_COMMONCRYPTO=OFF \
              -DENABLE_GNUTLS=OFF \
              -DENABLE_MBEDTLS=OFF \
              -DBUILD_SHARED_LIBS=OFF \
              -DBUILD_DOC=OFF \
              -DBUILD_EXAMPLES=OFF \
              -DBUILD_TOOLS=OFF \
              -DBUILD_REGRESS=OFF \
              -DBUILD_OSSFUZZ=OFF && \
            make -j$(nproc) && \
            make install"
          }
        shell: pwsh

      - name: Set up environment
        run: |
          echo "PKG_CONFIG_PATH=${{ github.workspace }}/lib/windows/${{ matrix.architecture }}/lib/pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "LIBRARY_PATH=${{ github.workspace }}/lib/windows/${{ matrix.architecture }}/lib" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "C_INCLUDE_PATH=${{ github.workspace }}/lib/windows/${{ matrix.architecture }}/include" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "CPLUS_INCLUDE_PATH=${{ github.workspace }}/lib/windows/${{ matrix.architecture }}/include" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "PKG_CONFIG_ALLOW_CROSS=1" | Out-File -FilePath $env:GITHUB_ENV -Append
        shell: pwsh

      - name: Create .cargo config
        run: |
          mkdir -p .cargo
          @"
           [target.${{ env.TARGET }}]
           rustflags = ["-L", "${{ github.workspace }}/lib/windows/${{ matrix.architecture }}/lib"]
          "@ | Out-File -FilePath .cargo/config.toml -Encoding utf8
          cat .cargo/config.toml
        shell: pwsh

      - name: Build for ${{ matrix.architecture }}
        run: |
          # Verify libraries exist
          if (Test-Path "${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\lib\libz.a") {
            Write-Host "libz.a exists"
          } else {
            Write-Host "libz.a not found"
            Get-ChildItem "${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\lib\" -Recurse
          }
          
          if (Test-Path "${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\lib\libzip.a") {
            Write-Host "libzip.a exists"
          } else {
            Write-Host "libzip.a not found"
            Get-ChildItem "${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\lib\" -Recurse
          }
          
          if (Test-Path "${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\lib\liblzma.a") {
            Write-Host "liblzma.a exists"
          } else {
            Write-Host "liblzma.a not found"
            Get-ChildItem "${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\lib\" -Recurse
          }
          
          # Set PATH to include MinGW
          $env:PATH = "${{ env.MSYS_PATH }};$env:PATH"
          
          # Add rustflags
          if ("${{ matrix.architecture }}" -eq "x64") {
            $env:RUSTFLAGS = "-C target-feature=+crt-static"
          } elseif ("${{ matrix.architecture }}" -eq "x86") {
            $env:RUSTFLAGS = "-C target-feature=+crt-static"
          } elseif ("${{ matrix.architecture }}" -eq "arm64") {
            $env:RUSTFLAGS = "-C target-feature=+crt-static"
          }
          
          Write-Host "Building for ${{ env.TARGET }} with flags: $env:RUSTFLAGS"
          Write-Host "PKG_CONFIG_PATH=$env:PKG_CONFIG_PATH"
          Write-Host "LIBRARY_PATH=$env:LIBRARY_PATH"
          Write-Host "PATH=$env:PATH"
          
          cargo build --release --target ${{ env.TARGET }}
        shell: pwsh

      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Copy binaries
        run: |
          # Find and copy binary
          $binaryPath = "target\${{ env.TARGET }}\release\payload_dumper.exe"
          
          Write-Host "Looking for binary in $binaryPath"
          if (Test-Path $binaryPath) {
            Copy-Item $binaryPath -Destination ".\artifacts\payload_dumper-${{ matrix.architecture }}.exe"
            Write-Host "Binary copied to artifacts directory"
          } else {
            Write-Host "Binary not found at expected location"
            Get-ChildItem "target\${{ env.TARGET }}\release\" -ErrorAction SilentlyContinue | Format-Table
            Get-ChildItem "target" -Recurse -Include "*.exe" -ErrorAction SilentlyContinue | Format-Table
          }
        shell: pwsh

      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: payload_dumper-${{ matrix.architecture }}-windows
          path: artifacts/payload_dumper-${{ matrix.architecture }}.exe
          if-no-files-found: warn
