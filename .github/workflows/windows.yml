name: Windows Builds

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        architecture: [x86_64, i686, arm64]
      fail-fast: false

    runs-on: windows-latest  
    steps:  
      - uses: actions/checkout@v3  

      # Setup MSYS2 environment
      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-${{ matrix.architecture == 'i686' && 'i686' || matrix.architecture == 'x86_64' && 'x86_64' || 'clang-aarch64' }}-toolchain
            base-devel
            cmake
            git
            make
            pkg-config

      # Add MSYS2 and MinGW to PATH
      - name: Set up environment
        run: |
          echo "C:\msys64\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          if ("${{ matrix.architecture }}" -eq "i686") {
            echo "C:\msys64\mingw32\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          } elseif ("${{ matrix.architecture }}" -eq "x86_64") {
            echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          } elseif ("${{ matrix.architecture }}" -eq "arm64") {
            echo "C:\msys64\clang64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

      - name: Install protoc using Chocolatey  
        run: |  
          choco install protoc -y  
          echo "$env:ChocolateyInstall\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append  
          protoc --version  

      - name: Set up Rust  
        uses: actions-rs/toolchain@v1  
        with:  
          toolchain: stable  
          profile: minimal  
          override: true  

      - name: Set target  
        id: set-target  
        run: |  
          if ("${{ matrix.architecture }}" -eq "x86_64") {  
            echo "TARGET=x86_64-pc-windows-gnu" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append  
          } elseif ("${{ matrix.architecture }}" -eq "i686") {  
            echo "TARGET=i686-pc-windows-gnu" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append  
          } else {  
            echo "TARGET=aarch64-pc-windows-msvc" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append  
          }  

      - name: Add Rust target  
        run: rustup target add ${{ env.TARGET }}  

      - name: Create library directories  
        run: |  
          mkdir -p ${{ github.workspace }}\lib\windows\${{ matrix.architecture }}  
          mkdir -p ${{ github.workspace }}\build\zlib  
          mkdir -p ${{ github.workspace }}\build\libzip  
          mkdir -p ${{ github.workspace }}\build\liblzma  

      - name: Download and extract zlib  
        run: |  
          cd ${{ github.workspace }}\build\zlib  
          curl -L "https://zlib.net/zlib-1.3.1.tar.gz" -o zlib.tar.gz  
          tar -xzf zlib.tar.gz --strip-components=1  

      - name: Build zlib  
        run: |  
          cd ${{ github.workspace }}\build\zlib  
          
          # Set compiler based on architecture
          if ("${{ matrix.architecture }}" -eq "i686") {
            $env:CC = "i686-w64-mingw32-gcc"
          } elseif ("${{ matrix.architecture }}" -eq "x86_64") {
            $env:CC = "x86_64-w64-mingw32-gcc"
          } else {
            $env:CC = "clang"
          }
          
          # Configure and build
          bash -c "./configure --prefix=$(${{ github.workspace }}.Replace('\','/') + '/lib/windows/${{ matrix.architecture }}') --static"
          make -j $env:NUMBER_OF_PROCESSORS
          make install
          
          # Verify build
          if (!(Test-Path "${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\lib\libz.a")) {
            Write-Error "Failed to build zlib static library"
            Get-ChildItem -Path "${{ github.workspace }}\lib\windows\${{ matrix.architecture }}" -Recurse
            exit 1
          }

      - name: Download and extract liblzma  
        run: |  
          cd ${{ github.workspace }}\build\liblzma  
          curl -L "https://github.com/tukaani-project/xz/releases/download/v5.8.1/xz-5.8.1.tar.gz" -o liblzma.tar.gz  
          tar -xzf liblzma.tar.gz --strip-components=1  

      - name: Build liblzma  
        run: |  
          cd ${{ github.workspace }}\build\liblzma  
          
          # Set host based on architecture
          if ("${{ matrix.architecture }}" -eq "i686") {
            $hostOption = "i686-w64-mingw32"
          } elseif ("${{ matrix.architecture }}" -eq "x86_64") {
            $hostOption = "x86_64-w64-mingw32"
          } else {
            $hostOption = "aarch64-w64-mingw32"
          }
          
          # Configure and build
          bash -c "./configure --host=$hostOption --prefix=$(${{ github.workspace }}.Replace('\','/') + '/lib/windows/${{ matrix.architecture }}') --disable-shared --enable-static"
          make -j $env:NUMBER_OF_PROCESSORS
          make install
          
          # Verify build
          if (!(Test-Path "${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\lib\liblzma.a")) {
            Write-Error "Failed to build liblzma static library"
            exit 1
          }

      - name: Download and extract libzip  
        run: |  
          cd ${{ github.workspace }}\build\libzip  
          curl -L "https://libzip.org/download/libzip-1.11.3.tar.xz" -o libzip.tar.xz  
          tar -xf libzip.tar.xz --strip-components=1  

      - name: Build libzip  
        run: |  
          cd ${{ github.workspace }}\build\libzip  
          mkdir -p build  
          cd build  
          
          # Set toolchain based on architecture
          if ("${{ matrix.architecture }}" -eq "i686") {
            $toolchain = "i686-w64-mingw32"
          } elseif ("${{ matrix.architecture }}" -eq "x86_64") {
            $toolchain = "x86_64-w64-mingw32"
          } else {
            $toolchain = "aarch64-w64-mingw32"
          }
          
          # Disable building tools to avoid linker issues
          cmake .. `
            -G "MinGW Makefiles" `
            -DCMAKE_C_COMPILER="$toolchain-gcc" `
            -DCMAKE_CXX_COMPILER="$toolchain-g++" `
            -DCMAKE_SYSTEM_NAME="Windows" `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}\lib\windows\${{ matrix.architecture }}" `
            -DZLIB_INCLUDE_DIR="${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\include" `
            -DZLIB_LIBRARY="${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\lib\libz.a" `
            -DLIBLZMA_INCLUDE_DIR="${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\include" `
            -DLIBLZMA_LIBRARY="${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\lib\liblzma.a" `
            -DBUILD_SHARED_LIBS=OFF `
            -DBUILD_TOOLS=OFF `
            -DBUILD_REGRESS=OFF `
            -DBUILD_EXAMPLES=OFF `
            -DBUILD_DOC=OFF
          
          cmake --build . --config Release --parallel $env:NUMBER_OF_PROCESSORS
          cmake --install .
          
          # Verify build
          if (!(Test-Path "${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\lib\libzip.a")) {
            Write-Error "Failed to build libzip static library"
            exit 1
          }

      - name: Set up environment  
        run: |  
          echo "PKG_CONFIG_PATH=${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append  
          echo "LIBRARY_PATH=${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\lib" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append  
          echo "C_INCLUDE_PATH=${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\include" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append  
          echo "CPLUS_INCLUDE_PATH=${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\include" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append  
          echo "PKG_CONFIG_ALLOW_CROSS=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append  

      - name: Create .cargo config  
        run: |  
          mkdir -p .cargo  
          @"  
          [target.${{ env.TARGET }}]  
          rustflags = ["-L", "${{ github.workspace }}\lib\windows\${{ matrix.architecture }}\lib"]  
          "@ | Out-File -FilePath .cargo\config.toml -Encoding utf8  

      - name: Build for ${{ matrix.architecture }}  
        run: |  
          $env:RUSTFLAGS = "-C target-feature=+crt-static"  
          cargo build --release --target ${{ env.TARGET }}  

      - name: Create artifacts directory  
        run: mkdir -p artifacts  

      - name: Copy binaries  
        run: |  
          cp target/${{ env.TARGET }}/release/payload_dumper.exe ./artifacts/payload_dumper-${{ matrix.architecture }}.exe  
          if (!(Test-Path ./artifacts/payload_dumper-${{ matrix.architecture }}.exe)) {
            Write-Error "Binary not found"
            Get-ChildItem -Recurse -Path target -Include *.exe
            exit 1
          }

      - name: Upload Binaries  
        uses: actions/upload-artifact@v4  
        with:  
          name: payload_dumper-${{ matrix.architecture }}-windows  
          path: artifacts/payload_dumper-${{ matrix.architecture }}.exe  
          if-no-files-found: error
